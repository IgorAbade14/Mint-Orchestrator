apiVersion: v1
kind: Service
metadata:
  name: mint-orchestrator-service
spec:
  selector:  # Conecta o serviço aos pods com label app: mint-orchestrator
    app: mint-orchestrator
  ports:
  - protocol: TCP
    port: 80  # Porta de acesso ao serviço
    targetPort: 5000  # Porta do container onde a app está rodando
    nodePort: 30080  # Porta do Node para acesso externo
  type: NodePort  # Expõe o serviço externamente via IP do Node