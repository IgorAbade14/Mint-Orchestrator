name: "Mint Orchestrator CI/CD"

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Deps
        run: |
          pip install flask gunicorn
          if [ -f app/requirements.txt ]; then pip install -r app/requirements.txt; fi

      - name: Python Syntax Check
        run: python -m compileall app

      - name: Docker Build Test
        run: |
          docker build -t mint-orchestrator:test .
          echo "✅ Build Docker concluído com sucesso!"

      - name: K8s Manifest Check
        run: |
          grep "kind: Deployment" k8s/deployment.yaml
          grep "kind: Service" k8s/service.yaml
          echo "✅ Manifestos básicos validados!"